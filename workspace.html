<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Otter Robotics IDE</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />


  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
    firebase.initializeApp({
      apiKey:            "AIzaSyCutLrtPRtwRmMSwOwcfyPIyky4TAoc6Po",
      authDomain:        "otterroboticsweb.firebaseapp.com",
      projectId:         "otterroboticsweb",
      storageBucket:     "otterroboticsweb.firebasestorage.app",
      messagingSenderId: "874362914334",
      appId:             "1:874362914334:web:fa40b8ac0b05476a9d500f"
    });

    var auth = firebase.auth();
    var db   = firebase.firestore();
    var currentUid   = null;
    var _projectId   = null;
    var _projectName = null;
    var _originalCode = '';

    auth.onAuthStateChanged(function(user) {
      if (!user) { window.location.href = 'login.html'; return; }
      currentUid = user.uid;
      initWorkspace();
    });

    function getDefaultCode() {
      return [
        '// Otter Robotics – Arduino Sketch',
        '// Board: LOLIN C3 Mini',
        '',
        'void setup() {',
        '  Serial.begin(115200);',
        '  Serial.println("Otter Robotics ready!");',
        '}',
        '',
        'void loop() {',
        '  Serial.println("Hello from Otter Bot!");',
        '  delay(1000);',
        '}'
      ].join('\n');
    }

    function initWorkspace() {
      _projectId    = sessionStorage.getItem('otter_project_id')   || null;
      _projectName  = sessionStorage.getItem('otter_project_name') || null;
      _originalCode = sessionStorage.getItem('otter_project_code') || getDefaultCode();
      var area = document.getElementById('codeArea');
      area.innerText = _originalCode;
      syncLines();
      ideLog('Otter Robotics IDE initialized.', 'ok');
      ideLog('Board: LOLIN C3 Mini', 'info');
      if (!navigator.serial) {
        ideLog('Web Serial not supported — use Chrome or Edge for USB connection.', 'warn');
      } else {
        navigator.serial.getPorts().then(function(ports) {
          if (ports.length > 0) ideLog(ports.length + ' previously granted port(s) available. Click Connect.', 'info');
        });
      }
    }

    function hasChanges() {
      return document.getElementById('codeArea').innerText.trim() !== _originalCode.trim();
    }

    function handleClose() {
      if (!hasChanges()) { window.location.href = 'projects.html'; return; }
      if (_projectId) {
        document.getElementById('savedProjectName').textContent = _projectName || 'this project';
        showModal('saveExistingModal');
      } else {
        document.getElementById('newProjectName').value = '';
        showModal('saveNewModal');
      }
    }

    function saveNew() {
      var nameInput = document.getElementById('newProjectName');
      var name = nameInput.value.trim();
      if (!name) { nameInput.style.borderColor = '#ef4444'; nameInput.focus(); return; }
      nameInput.style.borderColor = '';
      document.getElementById('saveErrNew').style.display = 'none';
      var btn = document.getElementById('btnSaveNew');
      btn.textContent = 'Saving…'; btn.disabled = true;
      persistProject(name, null)
        .then(function() { window.location.href = 'projects.html'; })
        .catch(function(e) {
          btn.textContent = 'Save'; btn.disabled = false;
          var el = document.getElementById('saveErrNew');
          el.textContent = 'Error: ' + e.code + ': ' + e.message;
          el.style.display = 'block';
        });
    }

    function saveExisting() {
      document.getElementById('saveErrExisting').style.display = 'none';
      var btn = document.getElementById('btnSaveExisting');
      btn.textContent = 'Saving…'; btn.disabled = true;
      persistProject(_projectName, _projectId)
        .then(function() { window.location.href = 'projects.html'; })
        .catch(function(e) {
          btn.textContent = 'Save'; btn.disabled = false;
          var el = document.getElementById('saveErrExisting');
          el.textContent = 'Error: ' + e.code + ': ' + e.message;
          el.style.display = 'block';
        });
    }

    function persistProject(name, existingId) {
      var code = document.getElementById('codeArea').innerText;
      var id   = existingId || (Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2));
      return db.collection('users').doc(currentUid).collection('projects').doc(id).set({
        name: name, code: code, updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }

    function closeWithoutSave() { window.location.href = 'projects.html'; }
    function showModal(id) { document.getElementById(id).classList.add('show'); }
    function hideModal(id) { document.getElementById(id).classList.remove('show'); }
    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('modal-overlay')) e.target.classList.remove('show');
    });
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #1a1b2e;
      --toolbar: #13152b;
      --panel:   #111220;
      --border:  rgba(255,255,255,0.08);
      --text:    #cdd6f4;
      --muted:   #6c7086;
      --blue:    #4D7FFF;
      --green:   #3ec46d;
      --orange:  #f07a35;
      --red:     #f87171;
      --ln:      #3b3d52;
    }
    html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
    .ide { display: flex; flex-direction: column; height: 100vh; }

    /* ── TOOLBAR ── */
    .toolbar {
      height: 52px; background: var(--toolbar);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 14px; gap: 8px; flex-shrink: 0;
    }
    .tb-logo { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .tb-logo img { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; }
    .tb-logo-name { font-size: 13px; font-weight: 700; color: var(--text); letter-spacing: -0.2px; }
    .tb-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
    .tb-spacer { flex: 1; }
    .tb-action {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 14px; border-radius: 7px; border: none;
      font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 600;
      cursor: pointer; flex-shrink: 0;
      transition: filter 0.15s, transform 0.1s;
    }
    .tb-action:hover { filter: brightness(1.1); }
    .tb-action:active { transform: scale(0.97); }
    .tb-action:disabled { opacity: 0.5; cursor: not-allowed; transform: none; filter: none; }
    .tb-verify { background: var(--green); color: #fff; }
    .tb-upload { background: var(--orange); color: #fff; }

    /* chips */
    .tb-chip {
      display: flex; align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden; flex-shrink: 0;
    }
    .tb-chip-segment { display: flex; align-items: center; gap: 6px; padding: 7px 12px; }
    .tb-chip-label { font-size: 10px; color: var(--muted); font-weight: 600; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.5px; }
    .tb-chip-value { font-size: 12.5px; color: var(--text); font-weight: 600; white-space: nowrap; }
    .tb-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; transition: background 0.3s, box-shadow 0.3s; }
    .tb-dot-off { background: var(--muted); }
    .tb-dot-on  { background: var(--green); box-shadow: 0 0 7px var(--green); }
    .tb-connect-btn {
      padding: 6px 12px; background: transparent; border: none;
      border-left: 1px solid var(--border);
      font-family: 'Inter', sans-serif; font-size: 11.5px; font-weight: 600;
      color: var(--blue); cursor: pointer; white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .tb-connect-btn:hover { background: rgba(77,127,255,0.1); }
    .tb-connect-btn.disconnecting { color: var(--red); }
    .tb-connect-btn.disconnecting:hover { background: rgba(248,113,113,0.1); }
    .tb-close {
      width: 28px; height: 28px; border-radius: 7px;
      border: 1px solid var(--border); background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted); font-size: 14px; flex-shrink: 0;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .tb-close:hover { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.3); color: #f87171; }

    /* ── EDITOR ── */
    .editor-wrap { flex: 1; display: flex; overflow: hidden; }
    .line-numbers {
      padding: 18px 12px 18px 10px; min-width: 48px; text-align: right;
      font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.75;
      color: var(--ln); border-right: 1px solid var(--border);
      flex-shrink: 0; user-select: none; overflow: hidden; white-space: pre;
    }
    .code-area {
      flex: 1; padding: 18px 20px;
      font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.75;
      outline: none; white-space: pre; overflow: auto;
      color: var(--text); caret-color: var(--blue);
    }
    .code-area::-webkit-scrollbar { width: 8px; height: 8px; }
    .code-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    /* ── BOTTOM PANEL ── */
    .bottom-panel {
      height: 200px; background: var(--panel);
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
      transition: height 0.2s ease;
    }
    .bottom-panel.collapsed { height: 34px; }
    .panel-tabs {
      display: flex; align-items: center;
      border-bottom: 1px solid var(--border);
      padding: 0 14px; height: 34px; flex-shrink: 0;
    }
    .panel-tab {
      padding: 0 12px; height: 100%;
      display: flex; align-items: center;
      font-size: 12px; font-weight: 500; color: var(--muted);
      cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: color 0.15s; user-select: none;
    }
    .panel-tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .panel-tab:hover:not(.active) { color: var(--text); }
    .panel-spacer { flex: 1; }
    .panel-collapse {
      width: 22px; height: 22px; border-radius: 5px;
      border: 1px solid var(--border); background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }
    .panel-collapse:hover { background: rgba(255,255,255,0.07); color: var(--text); }
    .panel-body {
      flex: 1; overflow-y: auto; padding: 8px 14px;
      font-family: 'JetBrains Mono', monospace; font-size: 11.5px; line-height: 1.75;
    }
    .panel-body::-webkit-scrollbar { width: 5px; }
    .panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
    .bottom-panel.collapsed .panel-body,
    .bottom-panel.collapsed .serial-send { display: none !important; }

    /* serial send bar */
    .serial-send {
      display: none; align-items: center; gap: 8px;
      padding: 6px 14px; border-top: 1px solid var(--border);
      background: var(--panel); flex-shrink: 0;
    }
    .serial-baud {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 8px; font-size: 11.5px; font-family: 'Inter', sans-serif;
      color: var(--muted); outline: none; cursor: pointer; appearance: none;
    }
    .serial-baud option { background: #13152b; }
    .serial-input {
      flex: 1; background: rgba(255,255,255,0.04);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 10px; font-size: 12px;
      font-family: 'JetBrains Mono', monospace; color: var(--text); outline: none;
      transition: border-color 0.15s;
    }
    .serial-input:focus { border-color: var(--blue); }
    .serial-input::placeholder { color: var(--muted); }
    .serial-send-btn {
      padding: 5px 12px; background: rgba(77,127,255,0.15);
      border: 1px solid rgba(77,127,255,0.25); border-radius: 6px;
      color: var(--blue); font-size: 12px; font-weight: 600;
      font-family: 'Inter', sans-serif; cursor: pointer; transition: background 0.15s;
    }
    .serial-send-btn:hover { background: rgba(77,127,255,0.25); }
    .serial-clear-btn {
      padding: 5px 10px; background: transparent;
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--muted); font-size: 11.5px; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .serial-clear-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }

    /* log lines */
    .log-line { display: flex; gap: 8px; white-space: pre-wrap; word-break: break-all; }
    .log-ts   { color: var(--muted); flex-shrink: 0; }
    .log-ok   { color: var(--green); }
    .log-info { color: var(--text); }
    .log-warn { color: #fbbf24; }
    .log-err  { color: var(--red); }
    .serial-text { color: var(--green); white-space: pre-wrap; word-break: break-all; }

    /* ── FOOTER ── */
    .footer {
      height: 22px; background: #0e0f1e;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px; font-size: 11px; color: var(--muted); flex-shrink: 0;
    }

    /* ── MODALS ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #13152b; border: 1px solid var(--border);
      border-radius: 15px; padding: 26px;
      width: 100%; max-width: 370px; margin: 16px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.55);
    }
    .modal h3 { font-size: 15.5px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 7px; }
    .modal p  { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 18px; }
    .modal-input {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 13px; font-size: 13.5px; font-weight: 500;
      font-family: 'Inter', sans-serif; color: var(--text); outline: none;
      margin-bottom: 18px; transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: var(--blue); }
    .modal-input::placeholder { color: rgba(205,214,244,0.25); }
    .modal-err { display: none; font-size: 12px; color: var(--red); margin-bottom: 12px; word-break: break-all; }
    .modal-actions { display: flex; gap: 7px; justify-content: flex-end; }
    .btn-m {
      padding: 8px 16px; border-radius: 7px;
      font-size: 12.5px; font-weight: 600;
      font-family: 'Inter', sans-serif; cursor: pointer; border: none;
      transition: opacity 0.15s;
    }
    .btn-m:hover { opacity: 0.83; }
    .btn-m:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost-m  { background: rgba(255,255,255,0.07); color: var(--text); }
    .btn-blue-m   { background: var(--blue); color: #fff; }
    .btn-danger-m { background: rgba(239,68,68,0.13); color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
  </style>
</head>
<body>
<div class="ide">

  <!-- TOOLBAR -->
  <div class="toolbar">

    <!-- LEFT: logo + actions -->
    <div class="tb-logo">
      <img src="logo.png" alt="Otter" onerror="this.style.display='none'" />
      <span class="tb-logo-name">Otter Robotics</span>
    </div>
    <div class="tb-divider"></div>
    <button class="tb-action tb-verify" id="verifyBtn" onclick="verifyCode()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
        <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Verify
    </button>
    <button class="tb-action tb-upload" id="uploadBtn" onclick="uploadCode()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
        <path d="M12 15V3M12 3L8 7M12 3l4 4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M4 20h16" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      Upload
    </button>

    <div class="tb-spacer"></div>

    <!-- RIGHT: Board chip + Device chip + Close -->

    <!-- Board chip -->
    <div class="tb-chip">
      <div class="tb-chip-segment">
        <span class="tb-chip-label">Board</span>
        <span class="tb-chip-value">LOLIN C3 Mini</span>
      </div>
    </div>

    <!-- Device chip -->
    <div class="tb-chip">
      <div class="tb-chip-segment" style="gap:8px;">
        <span class="tb-chip-label">Device</span>
        <div class="tb-dot tb-dot-off" id="connDot"></div>
        <span class="tb-chip-value" id="portLabel">Not connected</span>
      </div>
      <button class="tb-connect-btn" id="connectBtn" onclick="toggleConnection()">Connect</button>
    </div>

    <div class="tb-close" onclick="handleClose()" title="Close">✕</div>
  </div>

  <!-- EDITOR -->
  <div class="editor-wrap">
    <div class="line-numbers" id="lineNums">1</div>
    <div class="code-area" id="codeArea" contenteditable="true" spellcheck="false" oninput="syncLines()"></div>
  </div>

  <!-- BOTTOM PANEL -->
  <div class="bottom-panel" id="bottomPanel">
    <div class="panel-tabs">
      <div class="panel-tab active" onclick="switchTab(this,'output')">Output</div>
      <div class="panel-tab" onclick="switchTab(this,'serial')">Serial Monitor</div>
      <div class="panel-spacer"></div>
      <button class="panel-collapse" onclick="togglePanel()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
          <path id="collapseIcon" d="M18 15l-6-6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="panel-body" id="output"></div>
    <div class="panel-body" id="serial" style="display:none;"></div>
    <!-- Serial send bar (shown only when Serial Monitor tab is active) -->
    <div class="serial-send" id="serialSend">
      <select class="serial-baud" id="baudRate">
        <option value="9600">9600</option>
        <option value="115200" selected>115200</option>
        <option value="230400">230400</option>
        <option value="460800">460800</option>
      </select>
      <input class="serial-input" id="serialInput" placeholder="Send command…" onkeydown="if(event.key==='Enter') sendCommand()" />
      <button class="serial-send-btn" onclick="sendCommand()">Send</button>
      <button class="serial-clear-btn" onclick="clearSerial()">Clear</button>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span>Otter Robotics IDE v1.0.0 · LOLIN C3 Mini</span>
    <span id="footerStatus">Ready</span>
  </div>

</div>

<!-- MODAL: save new project -->
<div class="modal-overlay" id="saveNewModal">
  <div class="modal">
    <h3>Save project?</h3>
    <p>Give your project a name before closing.</p>
    <input class="modal-input" id="newProjectName" type="text" placeholder="Project name"
      oninput="this.style.borderColor=''" onkeydown="if(event.key==='Enter') saveNew()" />
    <div class="modal-err" id="saveErrNew"></div>
    <div class="modal-actions">
      <button class="btn-m btn-danger-m" onclick="closeWithoutSave()">Don't Save</button>
      <button class="btn-m btn-ghost-m" onclick="hideModal('saveNewModal')">Cancel</button>
      <button class="btn-m btn-blue-m" id="btnSaveNew" onclick="saveNew()">Save</button>
    </div>
  </div>
</div>

<!-- MODAL: save existing project -->
<div class="modal-overlay" id="saveExistingModal">
  <div class="modal">
    <h3>Unsaved changes</h3>
    <p>Save changes to "<span id="savedProjectName"></span>"?</p>
    <div class="modal-err" id="saveErrExisting"></div>
    <div class="modal-actions">
      <button class="btn-m btn-danger-m" onclick="closeWithoutSave()">Don't Save</button>
      <button class="btn-m btn-ghost-m" onclick="hideModal('saveExistingModal')">Cancel</button>
      <button class="btn-m btn-blue-m" id="btnSaveExisting" onclick="saveExisting()">Save</button>
    </div>
  </div>
</div>

<script>
  // ── EDITOR ──
  function syncLines() {
    var area = document.getElementById('codeArea');
    var count = (area.innerText.match(/\n/g) || []).length + 1;
    var s = '';
    for (var i = 1; i <= count; i++) s += i + '\n';
    document.getElementById('lineNums').textContent = s;
  }

  function switchTab(el, tab) {
    document.querySelectorAll('.panel-tab').forEach(function(t) { t.classList.remove('active'); });
    el.classList.add('active');
    document.getElementById('output').style.display  = tab === 'output' ? 'block' : 'none';
    document.getElementById('serial').style.display  = tab === 'serial' ? 'block' : 'none';
    document.getElementById('serialSend').style.display = tab === 'serial' ? 'flex'  : 'none';
    if (tab === 'serial') { var s = document.getElementById('serial'); s.scrollTop = s.scrollHeight; }
  }

  var collapsed = false;
  function togglePanel() {
    collapsed = !collapsed;
    document.getElementById('bottomPanel').classList.toggle('collapsed', collapsed);
    document.getElementById('collapseIcon').setAttribute('d',
      collapsed ? 'M6 9l6 6 6-6' : 'M18 15l-6-6-6 6');
  }

  // ── LOGGING ──
  function ts() {
    var d = new Date();
    return '[' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds()) + ']';
  }
  function pad(n) { return String(n).padStart(2,'0'); }
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function ideLog(msg, type) {
    var out = document.getElementById('output');
    var line = document.createElement('div');
    line.className = 'log-line';
    line.innerHTML = '<span class="log-ts">' + ts() + '</span><span class="log-' + (type||'info') + '">&nbsp;' + esc(msg) + '</span>';
    out.appendChild(line);
    out.scrollTop = out.scrollHeight;
  }

  // ── WEB SERIAL ──
  var serialPort      = null;
  var serialReader    = null;
  var pipeClosedProm  = null;
  var pipeAbortCtrl   = null;
  var isConnected     = false;

  function setConnUI(connected, label) {
    var dot  = document.getElementById('connDot');
    var lbl  = document.getElementById('portLabel');
    var btn  = document.getElementById('connectBtn');
    var foot = document.getElementById('footerStatus');
    dot.className    = 'tb-dot ' + (connected ? 'tb-dot-on' : 'tb-dot-off');
    lbl.textContent  = connected ? (label || 'USB Serial') : 'Not connected';
    btn.textContent  = connected ? 'Disconnect' : 'Connect';
    btn.className    = 'tb-connect-btn' + (connected ? ' disconnecting' : '');
    foot.textContent = connected ? 'Connected · ' + (label || 'USB Serial') : 'Ready';
    isConnected = connected;
  }

  async function toggleConnection() {
    if (isConnected) { await disconnectSerial(); }
    else             { await connectSerial();    }
  }

  // Reconnect to a previously granted port (no dialog)
  async function reconnectSerial() {
    if (!navigator.serial) return;
    var btn = document.getElementById('connectBtn');
    btn.disabled = true; btn.textContent = 'Connecting…';
    try {
      var ports = await navigator.serial.getPorts();
      if (ports.length === 0) { btn.disabled = false; btn.textContent = 'Connect'; ideLog('No previously granted port found.', 'warn'); return; }
      serialPort = ports[0];
      var baud = parseInt(document.getElementById('baudRate').value);
      await serialPort.open({ baudRate: baud });
      setConnUI(true, 'USB Serial');
      ideLog('Reconnected at ' + baud + ' baud.', 'ok');
      appendSerial('[Reconnected at ' + baud + ' baud]\n');
      startReading();
    } catch(e) {
      btn.disabled = false; btn.textContent = 'Connect';
      ideLog('Reconnect failed: ' + e.message, 'warn');
    }
  }

  async function connectSerial() {
    if (!navigator.serial) {
      ideLog('Web Serial API not supported. Use Chrome or Edge.', 'err');
      return;
    }
    var btn = document.getElementById('connectBtn');
    btn.disabled = true; btn.textContent = 'Connecting…';
    try {
      serialPort = await navigator.serial.requestPort({
        filters: [
          { usbVendorId: 0x303a }, // Espressif native USB CDC (ESP32-C3)
          { usbVendorId: 0x1a86 }, // WCH CH340 / CH341
          { usbVendorId: 0x10c4 }, // Silicon Labs CP210x
          { usbVendorId: 0x0403 }, // FTDI
        ]
      });
      var baud = parseInt(document.getElementById('baudRate').value);
      await serialPort.open({ baudRate: baud });
      setConnUI(true, 'USB Serial');
      ideLog('Connected at ' + baud + ' baud.', 'ok');
      appendSerial('[Connected at ' + baud + ' baud]\n');
      startReading();
    } catch(e) {
      btn.disabled = false; btn.textContent = 'Connect';
      if (e.name !== 'NotFoundError') ideLog('Connection failed: ' + e.message, 'err');
    }
  }

  // Release readable/writable streams WITHOUT closing the port.
  // Uses AbortController so the pipeTo promise resolves cleanly.
  async function releaseStreams() {
    if (serialReader) {
      await serialReader.cancel().catch(function(){});
      serialReader = null;
    }
    if (pipeAbortCtrl) {
      pipeAbortCtrl.abort();
      pipeAbortCtrl = null;
    }
    if (pipeClosedProm) {
      await pipeClosedProm.catch(function(){}); // expect AbortError — ignore
      pipeClosedProm = null;
    }
  }

  async function disconnectSerial() {
    var btn = document.getElementById('connectBtn');
    btn.disabled = true; btn.textContent = 'Disconnecting…';
    await releaseStreams();
    if (serialPort) {
      await serialPort.close().catch(function(e){ console.warn('close:', e); });
      serialPort = null;
    }
    setConnUI(false);
    btn.disabled = false;
    ideLog('Disconnected.', 'info');
    appendSerial('[Disconnected]\n');
  }

  async function startReading() {
    if (!serialPort) return;
    pipeAbortCtrl  = new AbortController();
    var dec        = new TextDecoderStream();
    pipeClosedProm = serialPort.readable.pipeTo(dec.writable, { signal: pipeAbortCtrl.signal });
    serialReader   = dec.readable.getReader();
    try {
      while (true) {
        var res = await serialReader.read();
        if (res.done) break;
        appendSerial(res.value);
      }
    } catch(e) {
      if (isConnected && e.name !== 'AbortError') ideLog('Serial read stopped: ' + e.message, 'warn');
    } finally {
      serialReader.releaseLock();
    }
  }

  function appendSerial(text) {
    var el   = document.getElementById('serial');
    var span = document.createElement('span');
    span.className   = 'serial-text';
    span.textContent = text;
    el.appendChild(span);
    el.scrollTop = el.scrollHeight;
  }

  function clearSerial() { document.getElementById('serial').innerHTML = ''; }

  async function sendCommand() {
    var input = document.getElementById('serialInput');
    var text  = input.value;
    if (!text) return;
    if (!isConnected || !serialPort || !serialPort.writable) {
      ideLog('Not connected. Connect to device first.', 'warn'); return;
    }
    try {
      var writer  = serialPort.writable.getWriter();
      var encoded = new TextEncoder().encode(text + '\r\n');
      await writer.write(encoded);
      writer.releaseLock();
      appendSerial('> ' + text + '\n');
      input.value = '';
    } catch(e) {
      ideLog('Send failed: ' + e.message, 'err');
    }
  }

  // ── COMPILE / UPLOAD ──
  var SERVER = 'http://localhost:3000';

  function serverErr(e) {
    return e.message.includes('Failed to fetch') || e.message.includes('NetworkError') ||
           e.message.includes('ERR_CONNECTION') || e.message.includes('ECONNREFUSED');
  }

  async function verifyCode() {
    var btn  = document.getElementById('verifyBtn');
    var code = document.getElementById('codeArea').innerText.trim();
    if (!code) { ideLog('Editor is empty.', 'warn'); return; }
    btn.disabled = true; btn.textContent = 'Verifying…';
    ideLog('Compiling sketch for LOLIN C3 Mini…', 'info');
    try {
      var resp = await fetch(SERVER + '/api/compile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code, fqbn: 'esp32:esp32:lolin_c3_mini' })
      });
      if (!resp.ok) throw new Error((await resp.text()) || 'Server error ' + resp.status);
      var data = await resp.json();
      ideLog('Compilation successful. Binary size: ' + Math.round((data.size || 0) / 1024) + ' KB', 'ok');
    } catch(e) {
      ideLog(serverErr(e) ? 'Compile server not reachable. Run: node server.js' : 'Compile error: ' + e.message,
             serverErr(e) ? 'warn' : 'err');
    } finally {
      btn.disabled = false; btn.textContent = 'Verify';
    }
  }

  async function uploadCode() {
    var code = document.getElementById('codeArea').innerText.trim();
    if (!code) { ideLog('Editor is empty.', 'warn'); return; }
    if (!isConnected) { ideLog('Connect to device first, then click Upload.', 'warn'); return; }

    var btn = document.getElementById('uploadBtn');
    btn.disabled = true; btn.textContent = 'Compiling…';
    ideLog('Compiling sketch…', 'info');

    // ── Phase 1: compile ──────────────────────────────────────────────────────
    var compileData;
    try {
      var resp = await fetch(SERVER + '/api/compile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code, fqbn: 'esp32:esp32:lolin_c3_mini' })
      });
      if (!resp.ok) throw new Error((await resp.text()) || 'Compile error ' + resp.status);
      compileData = await resp.json();
    } catch(e) {
      btn.disabled = false; btn.textContent = 'Upload';
      ideLog(serverErr(e) ? 'Compile server not reachable. Run: node server.js' : 'Compile error: ' + e.message,
             serverErr(e) ? 'warn' : 'err');
      return;
    }

    ideLog('Compile OK (' + Math.round((compileData.size||0)/1024) + ' KB).', 'ok');

    // ── Phase 2: find port on server side ─────────────────────────────────────
    btn.textContent = 'Detecting port…';
    ideLog('Detecting connected board…', 'info');

    var portAddress;
    try {
      var pr = await fetch(SERVER + '/api/ports');
      var pd = await pr.json();
      // prefer port matching our vendor ID (0x303a) or fqbn, otherwise first port
      var match = (pd.ports || []).find(function(p) {
        return p.fqbn && p.fqbn.includes('lolin_c3_mini');
      }) || (pd.ports || []).find(function(p) {
        return p.fqbn && p.fqbn.includes('esp32');
      }) || (pd.ports || [])[0];

      if (!match) throw new Error('No board detected. Check USB connection.');
      portAddress = match.address;
      ideLog('Board found on ' + portAddress + (match.board ? ' (' + match.board + ')' : '') + '.', 'ok');
    } catch(e) {
      btn.disabled = false; btn.textContent = 'Upload';
      ideLog('Port detection failed: ' + e.message, 'err');
      return;
    }

    // ── Phase 3: release browser port, let server upload ─────────────────────
    btn.textContent = 'Uploading…';
    ideLog('Releasing port for server upload…', 'info');
    await releaseStreams();
    if (serialPort) {
      await serialPort.close().catch(function(){});
      serialPort = null;
    }
    setConnUI(false);
    await new Promise(function(r){ setTimeout(r, 800); }); // let OS release port

    ideLog('Uploading via arduino-cli (Python esptool)…', 'info');
    ideLog('⚠ If it hangs on "Connecting…" — hold BOOT button, then release it.', 'warn');

    // SSE stream from server
    try {
      var uploadResp = await fetch(SERVER + '/api/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sketchDir: compileData.sketchDir,
          port: portAddress,
          fqbn: 'esp32:esp32:lolin_c3_mini'
        })
      });

      var reader  = uploadResp.body.getReader();
      var decoder = new TextDecoder();
      var buf     = '';
      var success = false;

      while (true) {
        var chunk = await reader.read();
        if (chunk.done) break;
        buf += decoder.decode(chunk.value, { stream: true });
        var lines = buf.split('\n');
        buf = lines.pop();
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line.startsWith('data:')) continue;
          var evt;
          try { evt = JSON.parse(line.slice(5).trim()); } catch(ex) { continue; }
          var t = evt.type === 'ok' ? 'ok' : evt.type === 'err' || evt.type === 'error' ? 'err' : 'info';
          ideLog(evt.msg, t);
          if (evt.type === 'done') {
            success = true;
            document.getElementById('footerStatus').textContent = 'Upload complete';
          }
          if (evt.type === 'error') {
            document.getElementById('footerStatus').textContent = 'Upload failed';
          }
        }
      }

      if (success) {
        ideLog('Waiting for board to restart…', 'info');
        await new Promise(function(r){ setTimeout(r, 2000); });
        ideLog('Reconnecting serial monitor…', 'info');
        await reconnectSerial();
      }

    } catch(e) {
      ideLog('Upload error: ' + e.message, 'err');
    }

    btn.disabled = false; btn.textContent = 'Upload';
  }
</script>
</body>
</html>
